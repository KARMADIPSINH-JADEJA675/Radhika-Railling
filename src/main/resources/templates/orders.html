<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Work Orders</title>

    <link href=
                  "https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background:#f5f5f5;">

<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3">

            Radhika Railing

        </a>

    </div>

</nav>

<!-- Orders Section -->

<div class="container mt-5">

    <h1 class="text-center fw-bold mb-5">

        Customer Work Orders

    </h1>

    <div class="table-responsive">

        <table class="table table-bordered table-hover bg-white">

            <thead class="table-dark">

            <tr>

                <th>ID</th>

                <th>Customer</th>

                <th>Mobile</th>

                <th>Address</th>

                <th>Width</th>

                <th>Height</th>

                <th>Grade</th>

                <th>Pipe Size</th>

                <th>Total Price</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="o : ${orders}">

                <td th:text="${o.id}"></td>

                <td th:text="${o.customerName}"></td>

                <td th:text="${o.mobile}"></td>

                <td th:text="${o.address}"></td>

                <td th:text="${o.width}"></td>

                <td th:text="${o.height}"></td>

                <td th:text="${o.pipeGrade}"></td>

                <td th:text="${o.pipeSize}"></td>

                <td>

                    ₹ <span th:text="${o.totalPrice}"></span>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

<!-- Footer -->

<div class="bg-dark text-white text-center p-3 mt-5">

    © 2026 Radhika Railing

</div>

</body>
</html>
