<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Products</title>

    <link href=
                  "https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
        }

        .navbar{
            background:black;
        }

        .card{
            border:none;
            border-radius:20px;
            transition:0.3s;
            overflow:hidden;
            background:white;
        }

        .card:hover{
            transform:translateY(-10px);
        }

        .card img{

            height:250px;

            width:100%;

            object-fit:cover;

            border-radius:20px 20px 0 0;

            background:white;

        }

        .btn-dark{
            border-radius:10px;
            padding:10px 25px;
        }

    </style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3">

            Radhika Railing

        </a>

    </div>

</nav>

<!-- Products -->

<div class="container mt-5">

    <h1 class="text-center fw-bold mb-5">

        Our Products

    </h1>

    <div class="row g-4">

        <!-- Dynamic Product -->

        <div class="col-md-4"
             th:each="p : ${products}">

            <div class="card shadow-lg h-100">

                <!-- Product Image -->

                <img th:src="@{'/images/' + ${p.image}}"
                     class="card-img-top">

                <!-- Product Details -->

                <div class="card-body text-center">

                    <h3 class="fw-bold"
                        th:text="${p.name}">
                    </h3>

                    <p class="mt-3 fs-5">

                        Category:
                        <span th:text="${p.category}"></span>

                    </p>

                    <h4 class="mt-3 fw-bold">

                        ₹ <span th:text="${p.price}"></span>

                    </h4>

                    <a href="/quotation"
                       class="btn btn-dark mt-3">

                        Get Quotation

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
