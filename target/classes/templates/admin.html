<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin Panel</title>

    <link href=
                  "https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
        }

        .card{
            border:none;
            border-radius:20px;
        }

        table img{
            border-radius:10px;
            object-fit:cover;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-5 fw-bold">

        Admin Panel

    </h1>

    <!-- FORM -->

    <div class="card shadow p-4 mb-5">

        <form action="/save"
              method="post">

            <div class="row g-3">

                <!-- Name -->

                <div class="col-md-2">

                    <input type="text"
                           name="name"
                           placeholder="Product Name"
                           class="form-control"
                           required>

                </div>

                <!-- Category -->

                <div class="col-md-2">

                    <input type="text"
                           name="category"
                           placeholder="steel/glass/aluminium"
                           class="form-control"
                           required>

                </div>

                <!-- Price -->

                <div class="col-md-2">

                    <input type="number"
                           name="price"
                           placeholder="Price"
                           class="form-control"
                           required>

                </div>

                <!-- Image -->

                <div class="col-md-3">

                    <input type="text"
                           name="image"
                           placeholder="steel/square1.jpeg"
                           class="form-control"
                           required>

                </div>

                <!-- Button -->

                <div class="col-md-3">

                    <button class="btn btn-dark w-100">

                        Add Product

                    </button>

                </div>

            </div>

        </form>

    </div>

    <!-- TABLE -->

    <table class="table table-bordered bg-white">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Image</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="p : ${products}">

            <td th:text="${p.id}"></td>

            <!-- IMAGE -->

            <td>

                <img th:src="@{'/images/' + ${p.image}}"
                     width="100"
                     height="100">

            </td>

            <!-- NAME -->

            <td th:text="${p.name}"></td>

            <!-- CATEGORY -->

            <td th:text="${p.category}"></td>

            <!-- PRICE -->

            <td>

                ₹ <span th:text="${p.price}"></span>

            </td>

            <!-- ACTION -->

            <td>

                <!-- EDIT -->

                <a th:href="@{/edit/{id}(id=${p.id})}"
                   class="btn btn-primary btn-sm">

                    Edit

                </a>

                <!-- DELETE -->

                <a th:href="@{/delete/{id}(id=${p.id})}"
                   class="btn btn-danger btn-sm">

                    Delete

                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
