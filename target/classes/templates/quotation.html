<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Railing Quotation</title>

    <link href=
                  "https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
        }

        .navbar{
            background:black;
        }

        .quote-box{
            background:white;
            padding:40px;
            border-radius:20px;
        }

    </style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3">

            Radhika Railing

        </a>

    </div>

</nav>

<!-- Quotation Section -->

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="quote-box shadow-lg">

                <h1 class="text-center fw-bold mb-4">

                    Get Railing Work Quotation

                </h1>

                <!-- Booking Form -->

                <form action="/place-order" method="post">

                    <!-- Width -->

                    <div class="mb-3">

                        <label class="form-label">

                            Railing Width (Feet)

                        </label>

                        <input type="number"
                               id="width"
                               name="width"
                               class="form-control"
                               onkeyup="calculate()"
                               required>

                    </div>

                    <!-- Height -->

                    <div class="mb-3">

                        <label class="form-label">

                            Railing Height (Feet)

                        </label>

                        <input type="number"
                               id="height"
                               name="height"
                               class="form-control"
                               onkeyup="calculate()"
                               required>

                    </div>

                    <!-- Pipe Grade -->

                    <div class="mb-3">

                        <label class="form-label">

                            Pipe Grade

                        </label>

                        <select id="grade"
                                name="pipeGrade"
                                class="form-select"
                                onchange="calculate()">

                            <option value="250">

                                202 Grade

                            </option>

                            <option value="450">

                                304 Grade

                            </option>

                        </select>

                    </div>

                    <!-- Pipe Size -->

                    <div class="mb-3">

                        <label class="form-label">

                            Pipe Size

                        </label>

                        <select name="pipeSize"
                                class="form-select">

                            <option>25 MM</option>

                            <option>38 MM</option>

                            <option>50 MM</option>

                        </select>

                    </div>

                    <!-- Total Price -->

                    <h3 class="mt-4">

                        Total Price:
                        ₹ <span id="total">0</span>

                    </h3>

                    <!-- Customer Name -->

                    <input type="text"
                           name="customerName"
                           placeholder="Enter Your Name"
                           class="form-control mt-4"
                           required>

                    <!-- Mobile -->

                    <input type="text"
                           name="mobile"
                           placeholder="Enter Mobile Number"
                           class="form-control mt-3"
                           required>

                    <!-- Address -->

                    <textarea name="address"
                              placeholder="Enter Address"
                              class="form-control mt-3"
                              required></textarea>

                    <!-- Work Type -->

                    <input type="text"
                           name="productName"
                           value="Railing Work"
                           class="form-control mt-3">

                    <!-- Hidden Total -->

                    <input type="hidden"
                           name="totalPrice"
                           id="hiddenTotal">

                    <!-- Hidden Grade -->

                    <input type="hidden"
                           name="pipeGrade"
                           id="hiddenGrade">

                    <!-- Button -->

                    <button class="btn btn-dark w-100 mt-4">

                        Confirm Work Order

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- Footer -->

<div class="bg-dark text-white text-center p-3 mt-5">

    © 2026 Radhika Railing

</div>

<!-- JavaScript -->

<script>

    function calculate(){

        let width =
            document.getElementById("width").value;

        let height =
            document.getElementById("height").value;

        let grade =
            document.getElementById("grade");

        let gradePrice =
            grade.value;

        let gradeText =
            grade.options[grade.selectedIndex].text;

        let total =
            width * height * gradePrice;

        // Show total

        document.getElementById("total")
            .innerHTML = total;

        // Save hidden values

        document.getElementById("hiddenTotal")
            .value = total;

        document.getElementById("hiddenGrade")
            .value = gradeText;

    }

</script>

</body>
</html>
